<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="app-version" content="%%VERSION%%" />
  <title>Snake — Vibe Code</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Rubik+Mono+One&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <main class="app">
    <header class="hero">
      <div class="badge">VIBE CODE / SNAKE</div>
      <h1>Snake</h1>
      <p class="subtitle">纯前端小型作品：高对比视觉、干净手感、可复玩。键盘或触控都可玩。</p>
    </header>

    <section class="panel">
      <div class="hud">
        <div class="stat">
          <span class="label">SCORE</span>
          <span id="score" class="value">0</span>
        </div>
        <div class="stat">
          <span class="label">BEST</span>
          <span id="best" class="value">0</span>
        </div>
        <div class="stat">
          <span class="label">SPEED</span>
          <span id="speed" class="value">1.0x</span>
        </div>
      </div>

      <div class="game">
        <canvas id="board" width="640" height="640" aria-label="Snake game board" role="img"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-card">
            <h2 id="overlay-title">Ready?</h2>
            <p id="overlay-text">Press <strong>Space</strong> to start. Arrow keys / WASD to move.</p>
            <button id="start-btn" class="primary">Start</button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="pause-btn" class="ghost">Pause</button>
        <button id="restart-btn" class="ghost">Restart</button>
        <div class="speed">
          <label for="speed-range">Speed</label>
          <input id="speed-range" type="range" min="0.6" max="2.0" step="0.1" value="1.0" />
        </div>
      </div>

      <div class="touch">
        <button data-dir="up">▲</button>
        <div class="row">
          <button data-dir="left">◀</button>
          <button data-dir="down">▼</button>
          <button data-dir="right">▶</button>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="meta">
        <span>Made for vibe coding experiments.</span>
        <span id="version" class="version">v0.1.0</span>
      </div>
      <div class="keys">Keys: <span>WASD</span> / <span>Arrows</span> / <span>Space</span></div>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
